<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 280px; font-family: sans-serif; padding: 16px; }
    h2 { margin: 0 0 12px; font-size: 16px; color: #1a1a1a; }
    button { width: 100%; padding: 10px; font-size: 14px; border: none; border-radius: 6px; cursor: pointer; }
    #startBtn { background: #0091cd; color: white; }
    #startBtn:disabled { background: #aaa; cursor: not-allowed; }
    #status { margin-top: 12px; font-size: 13px; color: #444; min-height: 20px; }
    #log { margin-top: 8px; font-size: 11px; color: #666; max-height: 150px; overflow-y: auto; border-top: 1px solid #eee; padding-top: 8px; }
  </style>
</head>
<body>
  <h2>PESU Slide Downloader</h2>
  <button id="startBtn">Start Downloading</button>
  <div id="status">Ready</div>
  <div id="log"></div>
  <script src="popup.js"></script>
</body>
</html>
